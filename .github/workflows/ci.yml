name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run PowerShell tests
        shell: pwsh
        run: |
          $tests = @(
            'tests/core-function-tests.ps1'
            'tests/setup-tests.ps1'
            'tests/install-dryrun-tests.ps1'
            'tests/install-bootstrap-tests.ps1'
            'tests/profile-transfer-tests.ps1'
            'tests/server-path-tests.ps1'
          )
          foreach ($test in $tests) {
            Write-Output "Running $test"
            & pwsh -NoProfile -File $test
            if ($LASTEXITCODE -ne 0) {
              throw "$test failed with exit code $LASTEXITCODE"
            }
          }

      - name: Check JavaScript syntax
        shell: pwsh
        run: |
          node --check src/server.mjs
          node --check src/web/app.js

  lint-powershell:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Lint PowerShell files (.ps1 + .psm1)
        shell: pwsh
        run: |
          $scripts = Get-ChildItem -Recurse -Include '*.ps1','*.psm1' |
            Where-Object { $_.FullName -notlike '*node_modules*' }
          if ($scripts.Count -eq 0) {
            Write-Output 'No PowerShell files found, skipping.'
            exit 0
          }
          Write-Output "Checking $($scripts.Count) file(s)..."
          $results = $scripts | ForEach-Object {
            Invoke-ScriptAnalyzer -Path $_.FullName -Severity @('Error')
          }
          if ($results) {
            $results | Format-Table -AutoSize
            throw "PSScriptAnalyzer found $($results.Count) issue(s)."
          }
          Write-Output 'PSScriptAnalyzer: no issues.'
