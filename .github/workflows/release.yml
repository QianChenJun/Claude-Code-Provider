name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint before release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Lint PowerShell files
        shell: pwsh
        run: |
          $scripts = Get-ChildItem -Recurse -Include '*.ps1','*.psm1' |
            Where-Object { $_.FullName -notlike '*node_modules*' }
          $results = $scripts | ForEach-Object {
            Invoke-ScriptAnalyzer -Path $_.FullName -Severity @('Error')
          }
          if ($results) {
            $results | Format-Table -AutoSize
            throw "PSScriptAnalyzer found $($results.Count) issue(s)."
          }

  test:
    name: Tests before release
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run PowerShell tests
        shell: pwsh
        run: |
          $tests = @(
            'tests/core-function-tests.ps1'
            'tests/setup-tests.ps1'
            'tests/install-dryrun-tests.ps1'
            'tests/install-bootstrap-tests.ps1'
            'tests/profile-transfer-tests.ps1'
            'tests/server-path-tests.ps1'
          )
          foreach ($test in $tests) {
            Write-Output "Running $test"
            & pwsh -NoProfile -File $test
            if ($LASTEXITCODE -ne 0) {
              throw "$test failed with exit code $LASTEXITCODE"
            }
          }

      - name: Check JavaScript syntax
        shell: pwsh
        run: |
          node --check src/server.mjs
          node --check src/web/app.js

  release:
    name: Package and Release
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify package contents
        run: |
          echo "=== Repository structure ==="
          find . -maxdepth 3 -not -path './.git/*' -not -path './node_modules/*' | sort
          echo ""
          echo "=== Checking required files ==="
          for f in \
            src/core/ProviderCore.psm1 \
            src/tools/Import-Core.ps1 \
            src/tools/Invoke-Provider.ps1 \
            src/tools/Sync-Shortcuts.ps1 \
            src/tools/Manage-ProviderUI.ps1 \
            src/tools/claude/Invoke-ClaudeProvider.ps1 \
            src/tools/codex/Invoke-CodexProvider.ps1 \
            src/server.mjs \
            src/web/index.html \
            src/web/app.js \
            src/web/styles.css \
            config/providers.example.json \
            config/codex-providers.example.json \
            Claude-Provider-Profiles-Kit/install.ps1 \
            Claude-Provider-Profiles-Kit/README.md \
            Claude-Provider-Profiles-Kit/providers.example.json \
            Claude-Provider-Profiles-Kit/codex-providers.example.json; do
            if [ -f "$f" ]; then
              echo "  [OK] $f"
            else
              echo "  [!!] MISSING: $f"
              exit 1
            fi
          done
          echo ""
          echo "All required files present."

      - name: Validate JavaScript syntax
        run: |
          node --check src/server.mjs
          node --check src/web/app.js
          echo "JS syntax OK."

      - name: Build Kit package
        run: |
          mkdir -p Claude-Provider-Profiles-Kit/src
          cp -r src/core src/tools src/web src/server.mjs \
            Claude-Provider-Profiles-Kit/src/
          cd Claude-Provider-Profiles-Kit
          zip -r ../Claude-Provider-Profiles-Kit.zip .
          cd ..
          echo ""
          echo "=== Package contents ==="
          unzip -l Claude-Provider-Profiles-Kit.zip | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Claude-Provider-Profiles-Kit.zip
          generate_release_notes: true
          draft: false
          prerelease: false
