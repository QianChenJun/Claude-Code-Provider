name: Bug 报告
description: 报告可复现的功能异常
title: "[Bug] "
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请勿提交真实 API Key、Token、内部地址或未脱敏配置。

  - type: input
    id: windows
    attributes:
      label: Windows 版本
      placeholder: Windows 11 24H2
    validations:
      required: true

  - type: input
    id: powershell
    attributes:
      label: PowerShell 版本
      description: 运行 `$PSVersionTable.PSVersion` 获取。
      placeholder: 7.5.2
    validations:
      required: true

  - type: input
    id: cli
    attributes:
      label: 相关 CLI 与版本
      placeholder: Claude Code x.y.z / Codex CLI x.y.z

  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 请提供能够稳定复现问题的最小步骤。
      placeholder: |
        1. 执行……
        2. 选择……
        3. 出现……
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为与脱敏日志
      description: 请移除 API Key、Token、用户名、内部地址和敏感路径。
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue，未发现相同问题。
          required: true
        - label: 我已确认内容中不包含真实凭据或敏感信息。
          required: true
