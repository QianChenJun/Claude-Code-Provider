name: 功能请求
description: 建议新的能力或体验改进
title: "[Feature] "
body:
  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 请描述当前遇到的问题，以及谁会从这个改进中受益。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述期望的命令、配置或交互方式。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue，未发现相同建议。
          required: true
        - label: 该建议不会要求在仓库中保存真实 API Key 或 Token。
          required: true
