<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Claude 供应商配置</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div>
        <p class="eyebrow">ccp 管理台</p>
        <h1>Claude 供应商配置</h1>
        <p class="summary">保留 Claude Code 原配置，只覆盖 URL、Key 和模型。新增厂商后，保存配置并运行 ccp-sync 生成快捷命令。</p>
      </div>
      <div class="hero-card">
        <span>配置文件</span>
        <code id="config-path">%USERPROFILE%\.claude\provider-profiles\providers.json</code>
      </div>
    </section>

    <section class="toolbar">
      <button id="add-profile" class="primary">新增供应商</button>
      <button id="save-config">保存配置</button>
      <button id="save-sync-config">保存并同步</button>
      <button id="reload-config">重新加载</button>
      <button id="expand-all">全部展开</button>
      <button id="collapse-all">全部收起</button>
      <span id="status" class="status"></span>
    </section>

    <section id="profiles" class="profiles" aria-live="polite"></section>

    <template id="profile-template">
      <article class="profile-card">
        <header class="profile-head">
          <button data-action="toggle" class="profile-toggle" type="button" aria-expanded="false">
            <span data-summary-name></span>
            <span data-summary-meta></span>
          </button>
          <div class="card-actions">
            <button data-action="copy" type="button">复制</button>
            <button data-action="remove" class="danger" type="button" title="删除">删除</button>
          </div>
        </header>

        <div class="profile-body">
          <div class="grid">
            <label>
              配置 ID
              <input data-field="id" class="profile-id" placeholder="profile_id">
            </label>
            <label>
              显示名称
              <input data-field="displayName" placeholder="供应商显示名">
            </label>
            <label>
              快捷命令
              <input data-field="shortcut" placeholder="xxx-claude">
            </label>
            <label class="wide">
              接口地址
              <input data-field="baseUrl" placeholder="https://example.com/anthropic">
            </label>
            <label>
              鉴权环境变量
              <select data-field="authEnv">
                <option value="ANTHROPIC_AUTH_TOKEN">ANTHROPIC_AUTH_TOKEN</option>
                <option value="ANTHROPIC_API_KEY">ANTHROPIC_API_KEY</option>
              </select>
            </label>
            <label>
              API Key
              <input data-field="apiKey" type="password" autocomplete="off" placeholder="可直接填，也可用下方环境变量">
            </label>
            <label>
              API Key 环境变量
              <input data-field="apiKeyEnv" placeholder="XXX_CLAUDE_API_KEY">
            </label>
            <label>
              API Key 文件
              <input data-field="apiKeyFile" placeholder="%USERPROFILE%\.keys\provider.txt">
            </label>
            <label>
              默认模型
              <input data-field="model" placeholder="供应商模型名">
            </label>
            <label>
              Haiku 映射
              <input data-field="haikuModel" placeholder="可留空">
            </label>
            <label>
              Sonnet 映射
              <input data-field="sonnetModel" placeholder="可留空">
            </label>
            <label>
              Opus 映射
              <input data-field="opusModel" placeholder="可留空">
            </label>
            <label>
              CLI 默认 --model
              <input data-field="cliModel" placeholder="sonnet">
            </label>
            <label class="wide">
              extraEnv JSON
              <textarea data-field="extraEnv" rows="3" placeholder="{&quot;CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC&quot;:&quot;1&quot;}"></textarea>
            </label>
          </div>

          <footer>
            <code data-preview></code>
          </footer>
        </div>
      </article>
    </template>
  </main>

  <script src="./app.js"></script>
</body>
</html>
